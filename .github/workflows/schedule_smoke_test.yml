name: Schedule Smoke Test

on:
  schedule:
    # Temporary scheduler probe. Remove after confirming schedule events work.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Print trigger context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "event_schedule=${{ github.event.schedule }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          date -u +"utc_now=%Y-%m-%dT%H:%M:%SZ"

      - name: Write run summary
        run: |
          {
            echo "## Schedule Smoke Test"
            echo ""
            echo "- event: ${{ github.event_name }}"
            echo "- schedule: ${{ github.event.schedule }}"
            echo "- ref: ${{ github.ref }}"
            echo "- sha: ${{ github.sha }}"
            echo "- utc_now: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          } >> "$GITHUB_STEP_SUMMARY"
