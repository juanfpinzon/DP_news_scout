name: Daily Digest

on:
  schedule:
    # GitHub Actions cron is UTC. This matches 09:00 CET during standard time.
    - cron: "0 8 * * 1-5"
  workflow_dispatch:

jobs:
  run-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e .
      - name: Run pipeline
        run: python -m src.main
