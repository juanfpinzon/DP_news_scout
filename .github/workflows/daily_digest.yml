name: Daily Digest

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run the pipeline without sending email"
        required: false
        default: false
        type: boolean
  repository_dispatch:
    types:
      - run-daily-digest

permissions:
  contents: read

concurrency:
  group: dpns-daily-digest
  cancel-in-progress: false

jobs:
  run-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
      AGENTMAIL_INBOX_ID: ${{ secrets.AGENTMAIL_INBOX_ID }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      FEEDBACK_EMAIL: ${{ secrets.FEEDBACK_EMAIL }}
      FEEDBACK_SUBJECT: ${{ secrets.FEEDBACK_SUBJECT }}
      FEEDBACK_URL: ${{ secrets.FEEDBACK_URL }}
      LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}
      DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) || (github.event_name == 'repository_dispatch' && github.event.client_payload.dry_run == true) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run pipeline
        run: python -m src.main
