selector_presets:
  generic_scrape: &generic_scrape
    article: "article, .post, .card, .resource-item, .listing-item, .teaser, .summary-item"
    title: "h1, h2, h3, h4, .title, .card-title, .teaser__title, .summary-item__title"
    link: "a[href]"
    date: "time, .date, .published, .post-date, .timestamp, .summary-item__date"
    summary: "p, .excerpt, .summary, .description, .teaser__excerpt"
  resource_scrape: &resource_scrape
    article: "article, .resource-item, .resource-card, .listing-item, .card, li"
    title: "h1, h2, h3, h4, .title, .card-title, .resource-card__title"
    link: "a[href]"
    date: "time, .date, .published, .post-date"
    summary: "p, .excerpt, .summary, .description"
  newsroom_scrape: &newsroom_scrape
    article: "article, .post, .news-item, .story-card, .cmp-teaser, .card"
    title: "h1, h2, h3, h4, .title, .card-title, .cmp-teaser__title"
    link: "a[href]"
    date: "time, .date, .published, .post-date, .news-date"
    summary: "p, .excerpt, .summary, .description, .cmp-teaser__description"

